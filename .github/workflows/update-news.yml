name: Update News Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

concurrency:
  group: update-news-snapshot
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update news snapshot
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: npm run update-news

      - name: Commit changes
        run: |
          if git diff --quiet -- news.json; then
            echo "No news changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.json
          git commit -m "chore: refresh news snapshot"
          git push
